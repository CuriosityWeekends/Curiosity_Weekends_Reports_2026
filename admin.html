<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Curiosity Weekends | Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter,sans-serif;
  background:#020617;
  color:#e5e7eb;
}

/* LOGIN */

#login{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.login-box{
  background:#020617;
  border:1px solid #1e293b;
  padding:32px;
  border-radius:14px;
  width:330px;
  box-shadow:0 25px 60px rgba(0,0,0,.6);
  text-align:center;
}

.login-box input{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:1px solid #1e293b;
  background:#020617;
  color:#fff;
}

.login-box button{
  width:100%;
  margin-top:16px;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  cursor:pointer;
}

.login-box button:hover{
  background:#1d4ed8;
}

/* DASHBOARD */

#dashboard{
  display:none;
  padding:25px;
  max-width:1200px;
  margin:auto;
}

/* Top */

.top{
  display:flex;
  justify-content:space-between;
  margin-bottom:25px;
  flex-wrap:wrap;
  gap:15px;
}

/* Controls */

.controls{
  display:flex;
  gap:10px;
}

.controls input{
  padding:8px 12px;
  border-radius:7px;
  border:1px solid #1e293b;
  background:#020617;
  color:#fff;
}

.controls button{
  padding:8px 14px;
  border:none;
  border-radius:7px;
  background:#2563eb;
  color:white;
  cursor:pointer;
}

/* Stats */

.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  margin-bottom:25px;
}

.stat{
  background:#020617;
  border:1px solid #1e293b;
  border-radius:12px;
  padding:18px;
}

/* Table */

.table-box{
  background:#020617;
  border:1px solid #1e293b;
  border-radius:14px;
  overflow:hidden;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:14px;
  text-align:left;
}

th{
  border-bottom:1px solid #1e293b;
}

td{
  border-bottom:1px solid #1e293b;
}

tr:hover td{
  background:#020617cc;
}

/* Delete Button */

.del-btn{
  background:#dc2626;
  border:none;
  color:white;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
  font-size:12px;
}

.del-btn:hover{
  background:#b91c1c;
}

</style>
</head>

<body>


<!-- LOGIN -->
<div id="login">
  <div class="login-box">

    <h2>Admin Login</h2>

    <input type="password" id="pass" placeholder="Password">

    <button onclick="login()">Login</button>

    <p id="err" style="color:#ef4444"></p>

  </div>
</div>


<!-- DASHBOARD -->
<div id="dashboard">

<div class="top">

  <div>
    <h1>Curiosity Weekends</h1>
    <p>Admin Dashboard</p>
  </div>

  <div class="controls">
    <input id="search" placeholder="Search...">
    <button onclick="loadData()">Refresh</button>
  </div>

</div>


<!-- Stats -->
<div class="stats">

  <div class="stat">
    <h3>Total Submissions</h3>
    <p id="total">0</p>
  </div>

  <div class="stat">
    <h3>Last Updated</h3>
    <p id="updated">--</p>
  </div>

</div>


<!-- Table -->
<div class="table-box">

<table>

<thead>
<tr>
  <th>Date</th>
  <th>Name</th>
  <th>Email</th>
  <th>Class</th>
  <th>Action</th>
</tr>
</thead>

<tbody id="data"></tbody>

</table>

</div>

</div>


<script>

/* CONFIG */

const PASSWORD = "report0816";

const URL =
"https://script.google.com/macros/s/AKfycbz-7hJVklSo6mAHq7VpthLUfGClqjuVF9DgBbgqMPcCECwzycj4y2jyfJTfmFX_RXPaKA/exec";


let allData = [];


/* LOCAL STORAGE */

function getDeleted(){
  return JSON.parse(localStorage.getItem("deletedRows") || "[]");
}

function saveDeleted(arr){
  localStorage.setItem("deletedRows",JSON.stringify(arr));
}


/* LOGIN */

function login(){

  const p = document.getElementById("pass").value;

  if(p === PASSWORD){

    document.getElementById("login").style.display="none";
    document.getElementById("dashboard").style.display="block";

    loadData();

  }else{

    document.getElementById("err").innerText="Invalid password";

  }
}


/* LOAD DATA */

function loadData(){

  fetch(URL)
  .then(r=>r.json())
  .then(data=>{

    let deleted = getDeleted();

    // Remove deleted rows
    data = data.filter(d=>!deleted.includes(d.date));

    allData = data.reverse();

    document.getElementById("total").innerText = data.length;

    document.getElementById("updated").innerText =
      new Date().toLocaleTimeString();

    render(allData);

  });

}


/* RENDER */

function render(data){

  const tbody = document.getElementById("data");

  tbody.innerHTML="";

  data.forEach(d=>{

    const tr = document.createElement("tr");

    tr.innerHTML = `

      <td>${new Date(d.date).toLocaleString()}</td>
      <td>${d.name}</td>
      <td>${d.email}</td>
      <td>${d.class}</td>

      <td>
        <button class="del-btn"
        onclick="deleteRow('${d.date}')">
        Delete
        </button>
      </td>

    `;

    tbody.appendChild(tr);

  });

}


/* DELETE */

function deleteRow(id){

  if(!confirm("Hide this entry from admin view?")) return;

  let deleted = getDeleted();

  deleted.push(id);

  saveDeleted(deleted);

  loadData();

}


/* SEARCH */

document.getElementById("search").oninput = e=>{

  const q = e.target.value.toLowerCase();

  const filtered = allData.filter(d=>

    d.name.toLowerCase().includes(q) ||
    d.email.toLowerCase().includes(q) ||
    d.class.toLowerCase().includes(q)

  );

  render(filtered);

};

</script>

</body>
</html>
